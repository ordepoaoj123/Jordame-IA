<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jordame IA</title>

    <link rel="stylesheet" href="styles.css">


    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
</head>

<body>

    <header>
        <h1>Jordame <span>IA</span></h1>
        <p class="subtitle">Qual sua ideia para hoje?</p>
    </header>

    <main>


        <section class="input-area">

            <textarea class="pesquisa" placeholder="Ex: um quadrado"></textarea>

            <button class="myButton">
                Criar
            </button>

        </section>



        <section class="resultado-container">


            <div class="codigo-area">

                <p>Código gerado:</p>

                <pre>
<code class="language-html wrapper-code"></code>
            </pre>

                <button class="copy-btn">
                    Copiar Código
                </button>

            </div>

            <div class="preview-area">

                <p>Preview do resultado:</p>

                <iframe class="preview" id="previewFrame" title="Preview do código gerado">
                </iframe>

            </div>

        </section>

    </main>


    <nav>
        <a class="suport" href="https://wa.me/qr/26R35ZCZOYGMJ1" target="_blank" rel="noopener noreferrer"
            aria-label="Suporte via WhatsApp">
            💬
        </a>
    </nav>


    <script src="scripts.js"></script>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-javascript.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-css.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-html.min.js"></script>

</body>

</html>
